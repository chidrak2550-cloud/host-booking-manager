kind = "mobile"
previewPath = "/booking-mobile/"
title = "ระบบจองที่พัก (มือถือ)"
version = "1.0.0"
id = "artifacts/booking-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/booking-mobile/" ]
localPort = 20732

[services.development]
run = "pnpm --filter @workspace/booking-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/booking-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/booking-mobile", "run", "serve" ]

[services.env]
PORT = "20732"
BASE_PATH = "/booking-mobile/"
